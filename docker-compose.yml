name: kubesight-ai

services:
  postgres:
    image: postgres:16-alpine
    container_name: kubesight-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kubesight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kubesight}
      POSTGRES_DB: ${POSTGRES_DB:-kubesight}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kubesight} -d ${POSTGRES_DB:-kubesight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: kubesight-backend
    environment:
      APP_NAME: ${APP_NAME:-KubeSight AI}
      APP_ENV: ${APP_ENV:-development}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kubesight}:${POSTGRES_PASSWORD:-kubesight}@postgres:5432/${POSTGRES_DB:-kubesight}
      MONITORED_CLUSTER_NAME: ${MONITORED_CLUSTER_NAME:-local-cluster}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_REQUEST_TIMEOUT_SECONDS: ${OLLAMA_REQUEST_TIMEOUT_SECONDS:-60}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

  ollama:
    image: ollama/ollama:latest
    container_name: kubesight-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ai

volumes:
  postgres-data:
  ollama-data:
