name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          SECRET_KEY: ci-test-secret
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
        run: pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev

  kubernetes:
    name: Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Render platform manifests
        run: kubectl kustomize kubernetes/base

      - name: Render sample workloads
        run: kubectl kustomize kubernetes/sample-apps

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - kubernetes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t kubesight-ai-backend:ci .

      - name: Build frontend image
        run: >
          docker build
          -f docker/frontend.Dockerfile
          --build-arg VITE_API_BASE_URL=http://localhost:8000
          -t kubesight-ai-frontend:ci
          .
