apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesight-backend
  namespace: kubesight
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesight-readonly
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/log
      - pods/status
      - services
      - endpoints
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesight-readonly
subjects:
  - kind: ServiceAccount
    name: kubesight-backend
    namespace: kubesight
roleRef:
  kind: ClusterRole
  name: kubesight-readonly
  apiGroup: rbac.authorization.k8s.io
