apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: kubesight-samples
  labels:
    app.kubernetes.io/name: checkout-service
    app.kubernetes.io/component: sample-logs
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: checkout-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: kubesight-samples
  labels:
    app.kubernetes.io/name: checkout-service
    app.kubernetes.io/component: sample-logs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-service
        app.kubernetes.io/component: sample-logs
    spec:
      containers:
        - name: checkout-service
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              while true; do
                echo "$(date -Iseconds) INFO checkout request received";
                echo "$(date -Iseconds) ERROR timeout while calling payment-service";
                echo "$(date -Iseconds) ERROR database connection refused host=postgres";
                sleep 10;
              done
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
