apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-worker
  namespace: kubesight-samples
  labels:
    app.kubernetes.io/name: report-worker
    app.kubernetes.io/component: sample-high-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: report-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: report-worker
        app.kubernetes.io/component: sample-high-cpu
    spec:
      containers:
        - name: report-worker
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              echo "$(date -Iseconds) INFO report-worker started";
              while true; do :; done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
