apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: kubesight-samples
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/component: sample-imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
        app.kubernetes.io/component: sample-imagepull
    spec:
      containers:
        - name: inventory-service
          image: ghcr.io/bhavanag-hegde/kubesight-inventory-service:missing
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
