apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: kubesight-samples
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/component: sample-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/component: sample-crashloop
    spec:
      containers:
        - name: payment-service
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              echo "$(date -Iseconds) INFO payment-service booting";
              sleep 3;
              echo "$(date -Iseconds) ERROR missing PAYMENT_PROVIDER_API_KEY";
              echo "$(date -Iseconds) ERROR application startup failed";
              exit 1
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
